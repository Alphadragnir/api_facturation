{% extends "facturation/base.html" %}
{% block title %}{% if product %}Modifier{% else %}Créer{% endif %} un produit{% endblock %}
{% block content %}
<div class="card">
    <h1>{% if product %}Modifier{% else %}Créer{% endif %} un produit</h1>
    <form method="post" style="max-width: 600px;">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Nom du produit</label>
            <input type="text" id="name" name="name" value="{{ product.name }}" required>
        </div>
        <div class="form-group">
            <label for="price">Prix</label>
            <input type="number" id="price" name="price" step="0.01" value="{{ product.price }}" required>
        </div>
        <div class="form-group">
            <label for="expiration_date">Date de péremption</label>
            <input type="date" id="expiration_date" name="expiration_date" value="{{ product.expiration_date }}" required>
        </div>
        <button type="submit" class="btn btn-success">Enregistrer</button>
        <a href="{% url 'product_list' %}" class="btn">Annuler</a>
    </form>
</div>
{% endblock %}
