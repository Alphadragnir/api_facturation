{% extends "facturation/base.html" %}
{% block title %}Tableau de bord{% endblock %}
{% block content %}
<div class="card">
    <h1>Tableau de bord</h1>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 2rem;">
        <div style="background: #ecf0f1; padding: 1.5rem; border-radius: 8px; text-align: center;">
            <h3 style="color: #3498db;">{{ total_products }}</h3>
            <p>Produits</p>
        </div>
        <div style="background: #ecf0f1; padding: 1.5rem; border-radius: 8px; text-align: center;">
            <h3 style="color: #27ae60;">{{ total_invoices }}</h3>
            <p>Factures</p>
        </div>
        <div style="background: #ecf0f1; padding: 1.5rem; border-radius: 8px; text-align: center;">
            <h3 style="color: #e74c3c;">{{ total_revenue }}€</h3>
            <p>Chiffre d'affaires</p>
        </div>
    </div>
    <div style="margin-top: 2rem;">
        <a href="{% url 'product_create' %}" class="btn btn-success">Ajouter un produit</a>
        <a href="{% url 'invoice_create' %}" class="btn btn-success">Créer une facture</a>
    </div>
</div>
{% endblock %}
